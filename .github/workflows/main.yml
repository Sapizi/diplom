name: CI

on:
  push:
  pull_request:

env:
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VAR_NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      SECRET_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      SECRET_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      VAR_NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${{ vars.NEXT_PUBLIC_YANDEX_MAPS_API_KEY }}
      SECRET_NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_YANDEX_MAPS_API_KEY }}
      VAR_NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      SECRET_NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAR_NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      SECRET_NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      VAR_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL: ${{ vars.NEXT_PUBLIC_SUPPORT_TELEGRAM_URL }}
      SECRET_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL: ${{ secrets.NEXT_PUBLIC_SUPPORT_TELEGRAM_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Resolve public env
        shell: pwsh
        run: |
          $supabaseUrl = if ($env:VAR_NEXT_PUBLIC_SUPABASE_URL) { $env:VAR_NEXT_PUBLIC_SUPABASE_URL } else { $env:SECRET_NEXT_PUBLIC_SUPABASE_URL }
          $supabaseKey = if ($env:VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY) { $env:VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY } else { $env:SECRET_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }
          $mapsKey = if ($env:VAR_NEXT_PUBLIC_YANDEX_MAPS_API_KEY) { $env:VAR_NEXT_PUBLIC_YANDEX_MAPS_API_KEY } else { $env:SECRET_NEXT_PUBLIC_YANDEX_MAPS_API_KEY }
          $vapidKey = if ($env:VAR_NEXT_PUBLIC_VAPID_PUBLIC_KEY) { $env:VAR_NEXT_PUBLIC_VAPID_PUBLIC_KEY } else { $env:SECRET_NEXT_PUBLIC_VAPID_PUBLIC_KEY }
          $siteUrl = if ($env:VAR_NEXT_PUBLIC_SITE_URL) { $env:VAR_NEXT_PUBLIC_SITE_URL } else { $env:SECRET_NEXT_PUBLIC_SITE_URL }
          $supportUrl = if ($env:VAR_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL) { $env:VAR_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL } else { $env:SECRET_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL }

          "NEXT_PUBLIC_SUPABASE_URL=$supabaseUrl" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$supabaseKey" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_YANDEX_MAPS_API_KEY=$mapsKey" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_VAPID_PUBLIC_KEY=$vapidKey" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_SITE_URL=$siteUrl" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_SUPPORT_TELEGRAM_URL=$supportUrl" >> $env:GITHUB_ENV

      - name: Diagnose public env
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        shell: pwsh
        run: |
          Write-Host "vars.NEXT_PUBLIC_SUPABASE_URL present: $([bool]$env:VAR_NEXT_PUBLIC_SUPABASE_URL)"
          Write-Host "secrets.NEXT_PUBLIC_SUPABASE_URL present: $([bool]$env:SECRET_NEXT_PUBLIC_SUPABASE_URL)"
          Write-Host "resolved NEXT_PUBLIC_SUPABASE_URL present: $([bool]$env:NEXT_PUBLIC_SUPABASE_URL)"
          Write-Host "vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY present: $([bool]$env:VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY)"
          Write-Host "secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY present: $([bool]$env:SECRET_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY)"
          Write-Host "resolved NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY present: $([bool]$env:NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY)"

      - name: Validate required public env
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        shell: pwsh
        run: |
          if (-not $env:NEXT_PUBLIC_SUPABASE_URL) { Write-Error "Missing NEXT_PUBLIC_SUPABASE_URL in both GitHub Variables and Secrets"; exit 1 }
          if (-not $env:NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY) { Write-Error "Missing NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY in both GitHub Variables and Secrets"; exit 1 }

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*', 'lib/**/*', 'public/**/*', 'next.config.mjs', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VAR_NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      SECRET_NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      SECRET_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      VAR_NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${{ vars.NEXT_PUBLIC_YANDEX_MAPS_API_KEY }}
      SECRET_NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_YANDEX_MAPS_API_KEY }}
      VAR_NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      SECRET_NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAR_NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      SECRET_NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      VAR_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL: ${{ vars.NEXT_PUBLIC_SUPPORT_TELEGRAM_URL }}
      SECRET_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL: ${{ secrets.NEXT_PUBLIC_SUPPORT_TELEGRAM_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker public build args
        id: docker_public_env
        shell: pwsh
        run: |
          $supabaseUrl = if ($env:VAR_NEXT_PUBLIC_SUPABASE_URL) { $env:VAR_NEXT_PUBLIC_SUPABASE_URL } else { $env:SECRET_NEXT_PUBLIC_SUPABASE_URL }
          $supabaseKey = if ($env:VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY) { $env:VAR_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY } else { $env:SECRET_NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }
          $mapsKey = if ($env:VAR_NEXT_PUBLIC_YANDEX_MAPS_API_KEY) { $env:VAR_NEXT_PUBLIC_YANDEX_MAPS_API_KEY } else { $env:SECRET_NEXT_PUBLIC_YANDEX_MAPS_API_KEY }
          $vapidKey = if ($env:VAR_NEXT_PUBLIC_VAPID_PUBLIC_KEY) { $env:VAR_NEXT_PUBLIC_VAPID_PUBLIC_KEY } else { $env:SECRET_NEXT_PUBLIC_VAPID_PUBLIC_KEY }
          $siteUrl = if ($env:VAR_NEXT_PUBLIC_SITE_URL) { $env:VAR_NEXT_PUBLIC_SITE_URL } else { $env:SECRET_NEXT_PUBLIC_SITE_URL }
          $supportUrl = if ($env:VAR_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL) { $env:VAR_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL } else { $env:SECRET_NEXT_PUBLIC_SUPPORT_TELEGRAM_URL }

          "NEXT_PUBLIC_SUPABASE_URL=$supabaseUrl" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=$supabaseKey" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_YANDEX_MAPS_API_KEY=$mapsKey" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_VAPID_PUBLIC_KEY=$vapidKey" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_SITE_URL=$siteUrl" >> $env:GITHUB_ENV
          "NEXT_PUBLIC_SUPPORT_TELEGRAM_URL=$supportUrl" >> $env:GITHUB_ENV

          "next_public_supabase_url=$supabaseUrl" >> $env:GITHUB_OUTPUT
          "next_public_supabase_publishable_default_key=$supabaseKey" >> $env:GITHUB_OUTPUT
          "next_public_yandex_maps_api_key=$mapsKey" >> $env:GITHUB_OUTPUT
          "next_public_vapid_public_key=$vapidKey" >> $env:GITHUB_OUTPUT
          "next_public_site_url=$siteUrl" >> $env:GITHUB_OUTPUT
          "next_public_support_telegram_url=$supportUrl" >> $env:GITHUB_OUTPUT

      - name: Validate Docker public build args
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        shell: pwsh
        run: |
          if (-not $env:NEXT_PUBLIC_SUPABASE_URL) { Write-Error "Missing NEXT_PUBLIC_SUPABASE_URL in both GitHub Variables and Secrets"; exit 1 }
          if (-not $env:NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY) { Write-Error "Missing NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY in both GitHub Variables and Secrets"; exit 1 }

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ steps.docker_public_env.outputs.next_public_supabase_url }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ steps.docker_public_env.outputs.next_public_supabase_publishable_default_key }}
            NEXT_PUBLIC_YANDEX_MAPS_API_KEY=${{ steps.docker_public_env.outputs.next_public_yandex_maps_api_key }}
            NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ steps.docker_public_env.outputs.next_public_vapid_public_key }}
            NEXT_PUBLIC_SITE_URL=${{ steps.docker_public_env.outputs.next_public_site_url }}
            NEXT_PUBLIC_SUPPORT_TELEGRAM_URL=${{ steps.docker_public_env.outputs.next_public_support_telegram_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
